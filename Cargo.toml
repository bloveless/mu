[package]
name = "mu"
version = "0.1.0"
authors = ["Brennon Loveless <brennon.loveless@gmail.com>"]
edition = "2024"
rust-version = "1.96"

[dependencies]
tokio = { version = "1.52.3", features = ["macros", "rt-multi-thread", "process"] }
async-openai = { version = "0.41.1", features = ["byot", "chat-completion"] }
clap = { version = "4.6.1", features = ["derive"] }
serde_json = "1.0.150"
tui-scrollview = "0.6.7"
ratatui = "0.30.2"
crossterm = "0.29.0"
color-eyre = "0.6.5"
lipsum = "0.9.1"
unicode-width = "0.2.2"
tokio-util = "0.7.18"
