version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - errcheck        # unchecked errors — real bugs
    - govet           # suspicious constructs (includes lostcancel, loopclosure, atomic)
    - staticcheck     # SA* checks, deprecated API usage, simplifications
    - unused          # dead code
    - ineffassign     # ineffectual assignments
    - bodyclose       # unclosed HTTP response bodies (model API calls)
    - errorlint       # errors.Is/As correctness, wrapped-error checks
    - copyloopvar     # Go 1.22+ loop var capture bugs
    - gosec           # security issues (tuned below)
    - noctx           # missing context.Context on http calls
    - unconvert       # unnecessary type conversions
    - unparam         # unused function parameters/returns
    - misspell        # comments/strings typos
    - contextcheck    # ensures context is propagated, not silently dropped/re-created
    - containedctx    # flags context.Context stored in a struct field instead of passed explicitly
    - gocritic        # broad checks; tuned to diagnostic/performance tags below

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false

    staticcheck:
      checks:
        - all
        - -ST1000  # package comment requirement — skip for CLI code

    gosec:
      excludes:
        - G104  # duplicate of errcheck
        - G304  # "file path from variable" — too noisy for a CLI that takes paths as args

    unparam:
      check-exported: false  # only flag unused params on unexported funcs

    gocritic:
      disabled-checks:
        - ifElseChain     # style-only, common in bubbletea Update() switch/if chains
      enabled-tags:
        - diagnostic      # catches real bugs: nil maps, sprintf mistakes, etc.
        - performance
      # explicitly not enabling "style" or "opinionated" tags — that's the noisy stuff

  exclusions:
    generated: lax
    presets:
      - comments
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - unparam
      # tea.Model interface methods (Init/Update/View) have fixed signatures;
      # don't nag about unused params/returns there
      - path: (tui|ui)/.*\.go
        linters:
          - unparam

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/bloveless/mu

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
